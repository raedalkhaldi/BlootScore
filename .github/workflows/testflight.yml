name: Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          # Need Xcode 16+ for iOS 18 SDK (required by App Store Connect)
          for xc in /Applications/Xcode_16*.app; do
            if [ -d "$xc" ]; then
              sudo xcode-select -s "$xc"
              echo "Selected: $xc"
              break
            fi
          done
          xcodebuild -version

      - name: Install Apple Certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$CERTIFICATE_P12" | base64 --decode -o $CERT_PATH
          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install Provisioning Profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROVISIONING_PROFILE" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i $PP_PATH))
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision
          echo "Installed profile: $PP_UUID"

      - name: Setup App Store Connect API Key
        env:
          APPSTORE_API_KEY_P8: ${{ secrets.APPSTORE_API_KEY_P8 }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$APPSTORE_API_KEY_P8" | base64 --decode -o ~/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8

      - name: Prepare Project
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
          PROFILE_NAME: ${{ secrets.PROFILE_NAME }}
        run: |
          python3 << PYEOF
          import os, re
          team = os.environ['TEAM_ID']
          profile = os.environ['PROFILE_NAME']
          build = os.popen("date +%Y%m%d%H%M").read().strip()
          with open('BlootScore.xcodeproj/project.pbxproj', 'r') as f:
              c = f.read()
          c = c.replace('CODE_SIGN_STYLE = Automatic;', 'CODE_SIGN_STYLE = Manual;')
          c = re.sub(r'CURRENT_PROJECT_VERSION = [^;]+', f'CURRENT_PROJECT_VERSION = {build}', c)
          # Add signing settings after each CODE_SIGN_STYLE = Manual
          c = c.replace(
              'CODE_SIGN_STYLE = Manual;',
              f'CODE_SIGN_IDENTITY = "Apple Distribution";\n\t\t\t\tCODE_SIGN_STYLE = Manual;\n\t\t\t\tDEVELOPMENT_TEAM = {team};\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "{profile}";'
          )
          with open('BlootScore.xcodeproj/project.pbxproj', 'w') as f:
              f.write(c)
          print(f'Done: team={team}, profile={profile}, build={build}')
          PYEOF

      - name: Build Archive
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
          PROFILE_NAME: ${{ secrets.PROFILE_NAME }}
        run: |
          xcodebuild archive \
            -project BlootScore.xcodeproj \
            -scheme BlootScore \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/BlootScore.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Export & Upload to TestFlight
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << EXPEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.bloot.BlootScore</key>
                  <string>BlootScore AppStore Profile</string>
              </dict>
              <key>uploadSymbols</key>
              <true/>
              <key>destination</key>
              <string>upload</string>
          </dict>
          </plist>
          EXPEOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/BlootScore.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -rf ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || true
