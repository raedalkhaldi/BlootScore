name: Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Install Apple Certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$CERTIFICATE_P12" | base64 --decode -o $CERT_PATH
          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Setup App Store Connect API Key
        env:
          APPSTORE_API_KEY_P8: ${{ secrets.APPSTORE_API_KEY_P8 }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$APPSTORE_API_KEY_P8" | base64 --decode -o ~/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8

      - name: Prepare Project for Distribution
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          python3 << PYEOF
          import os
          team = os.environ['TEAM_ID']
          build = os.popen("date +%Y%m%d%H%M").read().strip()
          with open('BlootScore.xcodeproj/project.pbxproj', 'r') as f:
              content = f.read()
          # Switch to manual signing
          content = content.replace('CODE_SIGN_STYLE = Automatic;', 'CODE_SIGN_STYLE = Manual;')
          # Update build number
          import re
          content = re.sub(r'CURRENT_PROJECT_VERSION = [^;]+', f'CURRENT_PROJECT_VERSION = {build}', content)
          # Add distribution signing settings after each CODE_SIGN_STYLE = Manual
          old = 'CODE_SIGN_STYLE = Manual;'
          new = f'''CODE_SIGN_STYLE = Manual;
          				CODE_SIGN_IDENTITY = "Apple Distribution";
          				DEVELOPMENT_TEAM = {team};
          				PROVISIONING_PROFILE_SPECIFIER = "";'''
          content = content.replace(old, new)
          with open('BlootScore.xcodeproj/project.pbxproj', 'w') as f:
              f.write(content)
          print(f'Set team={team}, build={build}, manual signing with Apple Distribution')
          PYEOF

      - name: Build Archive
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -project BlootScore.xcodeproj \
            -scheme BlootScore \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/BlootScore.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Export & Upload to TestFlight
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << EXPEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>uploadSymbols</key>
              <true/>
              <key>destination</key>
              <string>upload</string>
          </dict>
          </plist>
          EXPEOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/BlootScore.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Cleanup Keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
